settings:
  output_results: true

user_inputs:
  github_repo_name:
    title: "GitHub Repository Name"
  pr_number:
    title: "Pull Request Number"

crews:
  code_review_stage_1:
    context:
      stage_1_instructions: "stage-1-instructions.txt"
    output_naming_template: '{github_repo_name}-pr-{pr_number}-security-review-stage-1.md'
    agents:
      security_analyst:
        role: "Security Analyst"
        goal: "To perform a thorough security review of the code in the PR."
        backstory: >
          As a Security Analyst, you are tasked with ensuring the security and integrity of code changes.
          You will analyze the code diff in the PR {pr_number} of the {github_repo_name} repository, search for
          potential security flaws, and verify the implementation against best practices.
        tools:
          - fetch_pr_details
          - fetch_pr_diff
          - github_search
      jira_specialist:
        role: "Jira Specialist"
        goal: >
          To fetch the details from the Jira ticket mentioned in the PR title and understand the purpose of the
          PR: {pr_number} of the github repo: {github_repo_name}.
        backstory: >
          As a Jira Specialist, your role is to gather context about the PR by fetching relevant details from the
          associated Jira ticket. This information will help in understanding the intent behind the code changes.
        tools:
          - name: jira_get_issue_details
            custom_field_names_to_fetch:
              - "Team"          # Example: Add the custom fields you want to fetch
              - "Target Version"
            epic_issue_type_names:
              - "Epic"          # Example: List all names your Jira instance uses for epics
              - "Initiative"

          - fetch_pr_details
    tasks:
      fetch_jira_details:
        agent: jira_specialist
        description: >
          Use the FetchPRContentTool tool to look in the PR title for a Jira ticket number. If found, fetch the details
          from the Jira ticket to understand what the PR was trying to accomplish.
          When executing a tool - ensure you don't provide action input in json format!
          If a Jira ticket is not found in the PR title, note that in the report.
        expected_output: >
          Detailed information from the Jira ticket (if exist), including all collected information (i.e., ticket
          description, acceptance criteria, relevant comments), that provide context for the PR. Only provide the information
          that is available in the Jira ticket. If the ticket does not provide sufficient context, note that in the report.
      analyze_pr_diff:
        agent: security_analyst
        description: >
          Analyze the code diff in the GitHub repository: {github_repo_name} and PR number: {pr_number}.

          INSTRUCTIONS:
          ----------------
          {stage_1_instructions}
        expected_output: >
          - A complete markdown report detailing any security issues found in the PR code diff, including line numbers,
          severity, and recommendations for mitigation.
          - The report shall include the name of the GitHub repository and the PR number in the title.
          - For any recommendations, provide clear instructions on how to address the issues.
          - For any referenced functions or methods, provide the file path and class name if applicable.
          - If the only recommendation is to perform additional testing and review to ensure data integrity and
          consistent handling of edge cases, consider the PR as not having any security issues and omit the
          recommendation section altogether.
          - don't recommend tasks that are difficult for an automated bot to perform.
          - The report shall include the details collected by the Jira Specialist in a dedicated section:  "Information from
          Jira ticket <jira-issue-id>".

  code_review_stage_2:
    context:
      stage_2_instructions: "stage-2-instructions.txt"
    depends_on:
      - code_review_stage_1
    output_naming_template: '{github_repo_name}-pr-{pr_number}-security-review-stage-2.md'
    agents:
      security_analyst:
        role: "Security Analyst"
        goal: "To verify all recommendations and mitigations suggested in a security report are met."
        backstory: >
          As a Security Analyst, your role is to address any concerns or recommendations or mitigations, etc, raised in the
          security review report and amend the report to provide a final security assessment of the PR.
        tools:
          - fetch_pr_details
          - fetch_pr_diff
          - github_search
          - FindMethodImplementationTool
    tasks:
      verify_implementation:
        agent: security_analyst
        description: >
          Address every in-scope concern, mitigation, recommendation, etc., raised in the security review report.
          If there are no concerns at all, skip this task.
          The only in-scope concerns are those that are mentioned in the [SECURITY REPORT] section.

          IMPORTANT INSTRUCTIONS:
          {stage_2_instructions}
          
          [SECURITY REPORT]
          {code_review_stage_1}
          [/SECURITY REPORT]
          
          If you need to use the FindMethodImplementationTool and you don't know the initial class name, but know it's path,
          use the github_search tool to find it. When executing a tool - ensure you don't provide action input in json format!
          If you need to use the FindMethodImplementationTool tool, you need to use branch name 'develop' for the
          '{github_repo_name}' repository. All the context is available in the provided security report (no need to review the
          related PR for additional context).
          Perform as many steps needed to address every concern, mitigation, recommendation, etc., raised in the security
          review report. For each concern, mitigation, recommendation, etc., provide a clear explanation of how it was
          addressed.
          If the [SECURITY REPORT] contains relevant information from a Jira ticket, take that information into account
          when evaluating/addressing the concerns.
        expected_output: >
          A revised security review report that includes the status of each concern, mitigation, recommendation, etc.,
          raised in the initial report.

  code_review_stage_3:
    context:
      stage_3_instructions: "stage-3-instructions.txt"
    depends_on:
      - code_review_stage_2
    output_naming_template: '{github_repo_name}-pr-{pr_number}-security-review-stage-3.md'
    agents:
      security_analyst:
        role: "Security Analyst"
        goal: "To verify all recommendations and mitigations suggested in a security report are met."
        backstory: >
          As a Security Analyst, your role is to address any concerns or recommendations or mitigations, etc, raised in
          the security review report and amend the report to provide a final security assessment of the PR.
    tasks:
      triage:
        agent: security_analyst
        description: >
          Triage the report and decide if the PR is ready to be merged.

          IMPORTANT INSTRUCTIONS:
          {stage_3_instructions}
          
          [SECURITY REPORT]
          {code_review_stage_2}
          [/SECURITY REPORT]
        expected_output: >
          A final triage verdict on whether the PR is ready to be merged or if further action is required.
          The output should be in markdown format and be succinct - maximum 3 sentences.
          If the PR is ready to be merged, include the string "PR_READY_TO_MERGE" in the output.
          If the PR is not ready to be merged, include the string "PR_NOT_READY_TO_MERGE" in the output.

  code_review_stage_4:
    context:
      jira-ticket-instructions: "jira-ticket-instructions.txt"
      jira-ticket-template: "jira-ticket-template.md"
    depends_on:
      - code_review_stage_2
      - code_review_stage_3
    output_naming_template: '{github_repo_name}-pr-{pr_number}-security-review-stage-4.md'
    agents:
      security_analyst:
        role: "Security Analyst"
        goal: "To create a final security assessment of the PR."
        backstory: >
          As a Security Analyst, your role is to provide a final security assessment of the PR.
    tasks:
      create_jira_issue:
        agent: security_analyst
        description: >
          Create a Jira issue for the PR with the [SECURITY REPORT] content in the description:

          [SECURITY REPORT]
          {code_review_stage_2}
          [/SECURITY REPORT]

          [FINAL TRIAGE REPORT]
          {code_review_stage_3}
          [/FINAL TRIAGE REPORT]


          IMPORTANT INSTRUCTIONS:
          -----------------------
          {jira-ticket-instructions}

          The ticket shall follow the following template:
          -----------------------------------------------
          {jira-ticket-template}

          The jira ticket title shall be exactly: "PR #{pr_number} in {github_repo_name} - CREWS-CONTROL-REVIEW-TEST".
          The description should be formatted according to the Jira formatting guide.
          The status of the Jira ticket should be set to either "AI_REVIEW" or "AI_DISCARDED" based on the
          [FINAL TRIAGE REPORT], where "AI_REVIEW" indicates there are confirmed unresolved security findings and
          "AI_DISCARDED" indicates the PR is ready to be merged.
        expected_output: >
          The link to the created jira issue.
        tools:
          - create_issue
  code_review_stage_5:
    depends_on:
      - code_review_stage_4
    output_naming_template: '{github_repo_name}-pr-{pr_number}-security-review-stage-5.md'
    agents:
      security_analyst:
        role: "Security Analyst"
        goal: "To set correct priority for the created Jira ticket."
        backstory: >
          As a Security Analyst, your role is to set the correct priority for the created Jira ticket based on the
          final security assessment of the PR.
        tools:
          - jira_set_ticket_priority
    tasks:
      report:
        agent: security_analyst
        description: >
          Set the correct priority for the created Jira ticket based on the [FINAL TRIAGE REPORT] of the PR.
          The priority of the Jira ticket should be set to either "Critical", "High", "Medium", or "Low" based on
          highest severity of the confirmed unresolved security findings in the PR.

          The Jira ticket to be updated is the one mentioned in the [JIRA TICKET URL].

          [FINAL TRIAGE REPORT]
          {code_review_stage_3}
          [/FINAL TRIAGE REPORT]

          [JIRA TICKET URL]
          {code_review_stage_4}
          [/JIRA TICKET URL]
        expected_output: >
          The link to the updated Jira ticket.
